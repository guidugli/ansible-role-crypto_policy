---
- name: Converge
  hosts: all
  gather_facts: true
  become: false
  vars:
    enable_crypto_policy: true
    crypto_policy: DEFAULT:NO-SHA1
    crypto_policies_reload: true
    crypto_reboot_after_update: false
    crypto_policy_manage_fips_mode: false
  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
